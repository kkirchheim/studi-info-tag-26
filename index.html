<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/studi-info-tag-26/">
    <title>Video Klassifizierung Quiz</title>

    <!-- Tailwind CSS + DaisyUI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@3.9.3/dist/full.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css" />

    <style>
        /* CSSE Blue Theme */
        .text-primary { color: #0068b4; }
        .bg-primary { background-color: #0068b4; }
        .btn-primary { background-color: #0068b4; border-color: #0068b4; color: white; }
        .btn-primary:hover { background-color: #004d8f; }
        .btn-primary:disabled { background-color: #0068b4; opacity: 0.5; }

        /* Video container */
        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 0.5rem;
            overflow: hidden;
            aspect-ratio: 16 / 9;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Feedback styles */
        .feedback-correct {
            animation: slideIn 0.3s ease-out;
        }

        .feedback-wrong {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-base-100">
    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="bg-white border-b border-base-300">
            <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <img src="csse-logo.png" alt="CSSE Logo" class="h-12">
                    <div>
                        <h1 class="text-lg font-bold text-primary">Video Klassifizierung</h1>
                        <p class="text-xs text-base-content/60">Chair of Software & Systems Engineering</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 max-w-6xl mx-auto w-full px-4 py-8">
            <!-- Welcome Screen -->
            <div id="welcomeScreen" class="flex flex-col items-center justify-center min-h-[60vh] gap-6">
                <div class="text-center">
                    <h2 class="text-4xl font-bold mb-4">Video Klassifizierung Quiz</h2>
                    <p class="text-lg text-base-content/70 mb-8 max-w-md mx-auto">
                        Schauen Sie sich Videos an und klassifizieren Sie diese als "Normal" oder "Anomalie".
                    </p>
                </div>
                <button id="startBtn" class="btn btn-primary btn-lg gap-2">
                    <i class="fa-solid fa-play"></i>
                    <span>Quiz starten</span>
                </button>
            </div>

            <!-- Quiz Screen -->
            <div id="quizScreen" class="hidden">
                <!-- Progress Bar -->
                <div class="mb-6">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm font-semibold">Video <span id="currentNum">1</span> von <span id="totalNum">0</span></span>
                        <span id="scoreDisplay" class="text-sm text-primary font-semibold">Score: 0%</span>
                    </div>
                    <progress id="progressBar" class="progress progress-primary w-full" value="0" max="100"></progress>
                </div>

                <!-- Video Container -->
                <div class="mb-6">
                    <div class="video-container">
                        <video id="videoPlayer" controls>
                            <source src="" type="video/mp4">
                            Ihr Browser unterstützt Videos nicht.
                        </video>
                    </div>
                </div>

                <!-- Quiz Controls -->
                <div id="quizControls" class="flex flex-col gap-4">
                    <!-- Classification Buttons -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <button id="normalBtn" class="btn btn-success btn-lg gap-2" disabled>
                            <i class="fa-solid fa-check-circle"></i>
                            <span>Normal</span>
                        </button>
                        <button id="anomalyBtn" class="btn btn-error btn-lg gap-2" disabled>
                            <i class="fa-solid fa-exclamation-circle"></i>
                            <span>Anomalie</span>
                        </button>
                    </div>

                    <!-- Feedback -->
                    <div id="feedbackContainer" class="hidden">
                        <div id="feedbackContent" class="alert gap-4">
                            <div class="flex-1">
                                <p id="feedbackText"></p>
                                <p id="correctAnswerText" class="text-sm opacity-75 mt-2"></p>
                            </div>
                        </div>
                        <button id="nextBtn" class="btn btn-primary w-full mt-4 gap-2">
                            <i class="fa-solid fa-arrow-right"></i>
                            <span>Nächstes Video</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Results Screen -->
            <div id="resultsScreen" class="hidden flex flex-col items-center justify-center min-h-[60vh] gap-6">
                <div class="text-center">
                    <div class="mb-6">
                        <div class="text-6xl font-bold text-primary mb-2" id="finalScore">0%</div>
                        <p class="text-xl text-base-content/70" id="finalMessage"></p>
                    </div>
                    <div class="stats shadow bg-base-200">
                        <div class="stat place-items-center">
                            <div class="stat-title">Richtig</div>
                            <div class="stat-value text-primary" id="correctCount">0</div>
                        </div>
                        <div class="stat place-items-center">
                            <div class="stat-title">Falsch</div>
                            <div class="stat-value text-error" id="wrongCount">0</div>
                        </div>
                        <div class="stat place-items-center">
                            <div class="stat-title">Gesamt</div>
                            <div class="stat-value" id="totalCount">0</div>
                        </div>
                    </div>
                </div>
                <button id="restartBtn" class="btn btn-primary btn-lg gap-2">
                    <i class="fa-solid fa-redo"></i>
                    <span>Erneut versuchen</span>
                </button>
            </div>
        </main>

        <!-- Footer -->
        <footer class="border-t border-base-300 bg-base-100 py-4 mt-8">
            <div class="max-w-6xl mx-auto px-4 text-center text-sm text-base-content/60">
                <p>Chair of Software & Systems Engineering</p>
            </div>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
