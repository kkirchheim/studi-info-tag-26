    - 0
    - 1
    rotation:
    - 0
    - 180
    - 0
    attributes:
      image_size_x: 1920
      image_size_y: 1080
      fov: 105
  depth_rear:
    _target_: carlagen.Sensor
    name: Depth Camera Rear
    blueprint: sensor.camera.depth
    location:
    - -2.5
    - 0
    - 1
    rotation:
    - 0
    - 180
    - 0
    attributes:
      image_size_x: 1920
      image_size_y: 1080
      fov: 105
  camera_right:
    _target_: carlagen.Sensor
    name: RGB Camera Right
    blueprint: sensor.camera.rgb
    location:
    - -1
    - 0.9
    - 1
    rotation:
    - 0
    - 90
    - 0
    attributes:
      image_size_x: 1920
      image_size_y: 1080
      fov: 105
      focal_distance: 1000.0
      blur_amount: 1.0
      motion_blur_intensity: 0.45
      motion_blur_max_distortion: 0.35
  instance_segmentation_right:
    _target_: carlagen.Sensor
    name: Instance Segmentation Right
    blueprint: sensor.camera.instance_segmentation
    location:
    - -1
    - 0.9
    - 1
    rotation:
    - 0
    - 90
    - 0
    attributes:
      image_size_x: 1920
      image_size_y: 1080
      fov: 105
  depth_right:
    _target_: carlagen.Sensor
    name: Depth Camera Right
    blueprint: sensor.camera.depth
    location:
    - -1
    - 0.9
    - 1
    rotation:
    - 0
    - 90
    - 0
    attributes:
      image_size_x: 1920
      image_size_y: 1080
      fov: 105
  camera_left:
    _target_: carlagen.Sensor
    name: RGB Camera Left
    blueprint: sensor.camera.rgb
    location:
    - -1
    - -0.9
    - 1
    rotation:
    - 0
    - 270
    - 0
    attributes:
      image_size_x: 1920
      image_size_y: 1080
      fov: 105
      focal_distance: 1000.0
      blur_amount: 1.0
      motion_blur_intensity: 0.45
      motion_blur_max_distortion: 0.35
  instance_segmentation_left:
    _target_: carlagen.Sensor
    name: Instance Segmentation Left
    blueprint: sensor.camera.instance_segmentation
    location:
