data_dir: ./outputs/test/anomaly/${simulation.world_name}/traffic-light-flicker
name: test-ano-traffic-light-flicker
kill_carla: true
print_config: true
seed: 196
simulation:
  weather:
    cloudiness: 5.0
    precipitation: 0.0
    sun_altitude_angle: 45.0
    sun_azimuth_angle: -1.0
    fog_density: 2.0
    fog_distance: 0.75
    fog_falloff: 0.1
    precipitation_deposits: 0.0
    wind_intensity: 10.0
    wetness: 0.0
    scattering_intensity: 1.0
    mie_scattering_scale: 0.03
    rayleigh_scattering_scale: 0.0331
    dust_storm: 0.0
  world_name: Town01
  carla:
    bin: /run/media/ki/data/carla-0-9-14-patched/
    file: CarlaUE4.sh
    quality_level: Epic
    spawn: false
    host: carla
    port: 2000
    timeout: 10.0
  ego:
    index: 0
    mode: seed
    seed: ${seed}
    model: vehicle.tesla.model3
    autopilot: true
    percentage_speed: -10.0
    auto_lane_change: true
    ignore_walkers_percentage: 0
    ignore_lights_percentage: 0
  pedestrians:
    mode: seed
    seed: ${seed}
    number: 100
    models: []
    pedestrians_cross_factor: 10.0
  vehicles:
    mode: seed
    seed: ${seed}
    number: 50
    filter: '*vehicle*'
    broken_cars:
    - vehicle.mitsubishi.fusorosa
    - vehicle.carlamotors.firetruck
    - vehicle.ford.ambulance
    att_filters: null
  skip_start_ticks: 200
  scene_duration: 30
  fixed_delta_seconds: 0.1
  max_substep_delta_time: 0.01
  max_substeps: 10
callbacks:
  recorder:
    _target_: carlagen.callback.CarlaRecorderCallback
    recorder_file: carla.log
  car_light_control:
    _target_: carlagen.callback.misc.ControlCarLightsCallback
  save_autopilot_actions:
    _target_: carlagen.callback.saving.SaveAutopilotActions
  save_collisions:
    _target_: carlagen.callback.saving.SaveCollisions
    sensor_name: collision
  save_semantic_lidar:
    _target_: carlagen.callback.SaveSemanticLidarCallback
    sensor_name: Semantic LIDAR
    directory: pointclouds
  save_kitti_front:
    _target_: carlagen.callback.SaveKITTICallback
    directory: kitti-front
    lidar_name: Semantic LIDAR
    rgb_cam_name: RGB Camera
    depth_cam_name: Depth Camera
  save_kitti_rear:
    _target_: carlagen.callback.SaveKITTICallback
    directory: kitti-rear
    lidar_name: Semantic LIDAR
    rgb_cam_name: RGB Camera Rear
    depth_cam_name: Depth Camera Rear
  save_kitti_right:
    _target_: carlagen.callback.SaveKITTICallback
    directory: kitti-right
    lidar_name: Semantic LIDAR
    rgb_cam_name: RGB Camera Right
    depth_cam_name: Depth Camera Right
  save_kitti_left:
    _target_: carlagen.callback.SaveKITTICallback
    directory: kitti-left
    lidar_name: Semantic LIDAR
    rgb_cam_name: RGB Camera Left
    depth_cam_name: Depth Camera Left
  save_imu:
    _target_: carlagen.callback.SaveIMUCallback
    filename: imu.feather
  save_gnss:
    _target_: carlagen.callback.SaveGNSSCallback
    filename: gnss.feather
  save_weather:
    _target_: carlagen.callback.SaveWeatherCallback
    filename: weather.feather
  save_camera:
    _target_: carlagen.callback.SaveCameraCallback
    directory: rgb-front
    sensor_name: RGB Camera
  save_instance_segmentation:
    _target_: carlagen.callback.SaveInstanceSegmentationCallback
    directory: segmentation-front
    sensor_name: Instance Segmentation
  save_camera_back:
    _target_: carlagen.callback.SaveCameraCallback
    directory: rgb-rear
    sensor_name: RGB Camera Rear
  save_instance_segmentation_back:
    _target_: carlagen.callback.SaveInstanceSegmentationCallback
    directory: segmentation-rear
    sensor_name: Instance Segmentation Rear
  save_camera_left:
    _target_: carlagen.callback.SaveCameraCallback
    directory: rgb-left
    sensor_name: RGB Camera Left
  save_instance_segmentation_left:
    _target_: carlagen.callback.SaveInstanceSegmentationCallback
    directory: segmentation-left
    sensor_name: Instance Segmentation Left
  save_camera_right:
    _target_: carlagen.callback.SaveCameraCallback
    directory: rgb-right
    sensor_name: RGB Camera Right
  save_instance_segmentation_right:
    _target_: carlagen.callback.SaveInstanceSegmentationCallback
    directory: segmentation-right
    sensor_name: Instance Segmentation Right
  save_depth_front:
    _target_: carlagen.callback.SaveDepthCameraCallback
    sensor_name: Depth Camera
    directory: depth-front
  save_depth_left:
    _target_: carlagen.callback.SaveDepthCameraCallback
    sensor_name: Depth Camera Left
    directory: depth-left
  save_depth_right:
    _target_: carlagen.callback.SaveDepthCameraCallback
    sensor_name: Depth Camera Right
    directory: depth-right
  save_depth_rear:
    _target_: carlagen.callback.SaveDepthCameraCallback
    sensor_name: Depth Camera Rear
    directory: depth-rear
  random_daytime:
    _target_: carlagen.callback.RandomDayTimeCallback
    cb_seed: ${seed}
  random_weather:
    _target_: carlagen.callback.RandomWeatherCallback
    cb_seed: ${seed}
  create_video:
    _target_: carlagen.callback.CreateVideoCallback
  anomaly:
    _target_: carlagen.callback.FlickerTrafficLightCallback
    scheduler_mode: frequency
    frequency: 1
    duration:
    - 25
    - 35
    seed: ${seed}
    scheduler_seed: ${seed}
    sensors:
    - name: Instance Segmentation
      directory: anomaly-front
    - name: Instance Segmentation Rear
      directory: anomaly-rear
    - name: Instance Segmentation Left
      directory: anomaly-left
    - name: Instance Segmentation Right
      directory: anomaly-right
    - name: Semantic LIDAR
      directory: anomaly-lidar
sensors:
  camera:
    _target_: carlagen.Sensor
    name: RGB Camera
    blueprint: sensor.camera.rgb
    location:
    - 0
    - 0
    - 1.8
    rotation:
    - 0
    - 0
    - 0
    attributes:
      image_size_x: 1920
      image_size_y: 1080
      fov: 105
      focal_distance: 1000.0
      blur_amount: 1.0
      motion_blur_intensity: 0.45
      motion_blur_max_distortion: 0.35
  instance_segmentation:
    _target_: carlagen.Sensor
    name: Instance Segmentation
    blueprint: sensor.camera.instance_segmentation
    location:
    - 0
    - 0
    - 1.8
    rotation:
    - 0
    - 0
    - 0
    attributes:
      image_size_x: 1920
      image_size_y: 1080
      fov: 105
  lidar:
    _target_: carlagen.Sensor
    name: Semantic LIDAR
    blueprint: sensor.lidar.ray_cast_semantic
    location:
    - 0
    - 0
    - 1.8
    rotation:
    - 0
    - 0
    - 0
    attributes:
      channels: 64
      rotation_frequency: 60
      points_per_second: 1300000
      range: 120
      upper_fov: 14
      lower_fov: -16
  depth:
    _target_: carlagen.Sensor
    name: Depth Camera
    blueprint: sensor.camera.depth
    location:
    - 0
    - 0
    - 1.8
    rotation:
    - 0
    - 0
    - 0
    attributes:
      image_size_x: 1920
      image_size_y: 1080
      fov: 105
  camera_rear:
    _target_: carlagen.Sensor
    name: RGB Camera Rear
    blueprint: sensor.camera.rgb
    location:
    - -2.5
    - 0
    - 1
    rotation:
    - 0
    - 180
    - 0
    attributes:
      image_size_x: 1920
      image_size_y: 1080
      fov: 105
      focal_distance: 1000.0
      blur_amount: 1.0
      motion_blur_intensity: 0.45
      motion_blur_max_distortion: 0.35
  instance_segmentation_rear:
